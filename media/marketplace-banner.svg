  <text x="742" y="333" fill="#EAF1FF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">Configs</text>

  <text x="856" y="190" fill="#A9BEF7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700">MY BLUEPRINTS</text>
  <rect x="854" y="210" width="222" height="54" rx="16" fill="#173669"/>
  <circle cx="878" cy="237" r="7" fill="#5BC0FF"/>
  <text x="895" y="232" fill="#FFFFFF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700">AGENTS.md</text>
  <text x="895" y="250" fill="#B8CBFF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">Team coding blueprint</text>

  <rect x="854" y="276" width="222" height="54" rx="16" fill="#132A55"/>
