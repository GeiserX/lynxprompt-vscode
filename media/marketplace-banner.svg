  <text x="1027" y="472" fill="#DDBBFF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700">DIFF</text>

  <path d="M824 514H1076" stroke="#2E436D" stroke-width="2" stroke-linecap="round"/>
  <rect x="854" y="522" width="104" height="16" rx="8" fill="#234985"/>
  <rect x="968" y="522" width="108" height="16" rx="8" fill="#2B2E63"/>
</g>
