  <text x="895" y="298" fill="#FFFFFF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700">CLAUDE.md</text>
  <text x="895" y="316" fill="#B8CBFF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">Workspace assistant rules</text>

  <text x="856" y="366" fill="#A9BEF7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700">LOCAL CONFIG FILES</text>
  <rect x="854" y="386" width="222" height="46" rx="14" fill="#101B3D"/>
