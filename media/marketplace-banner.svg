  <text x="742" y="236" fill="#EAF1FF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">My</text>
  <text x="742" y="255" fill="#EAF1FF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">Blueprints</text>

  <rect x="728" y="286" width="90" height="64" rx="14" fill="#1A224C"/>
