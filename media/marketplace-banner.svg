  <text x="1021" y="414" fill="#7FE4FF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700">SYNC</text>

  <rect x="854" y="444" width="222" height="46" rx="14" fill="#101B3D"/>
  <text x="876" y="472" fill="#F2F6FF" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700">AGENTS.md</text>
