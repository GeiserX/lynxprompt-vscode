name: Publish Extension

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Sync engines.vscode with @types/vscode
        run: |
          TYPES_VER=$(node -p "require('./package.json').devDependencies['@types/vscode']")
          CURRENT_ENGINE=$(node -p "require('./package.json').engines.vscode")
          EXPECTED="^${TYPES_VER}"
          if [ "$CURRENT_ENGINE" != "$EXPECTED" ]; then
            node -e "const p=require('./package.json'); p.engines.vscode='^'+p.devDependencies['@types/vscode']; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
            echo "Synced engines.vscode: $CURRENT_ENGINE → $EXPECTED"
          fi

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(npx semver "$CURRENT" -i patch)
          npm version "$NEW" --no-git-tag-version
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW"

      # Commit BEFORE publish so the repo always advances.
      # If publish fails later, the next push bumps to a new version
      # instead of retrying the same one in an infinite loop.
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Package VSIX
        run: npx @vscode/vsce package --no-git-tag-version -o "lynxprompt-${{ steps.version.outputs.version }}.vsix"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-git-tag-version -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        continue-on-error: true
        run: npx ovsx publish "lynxprompt-${{ steps.version.outputs.version }}.vsix" -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Tag and push
        run: |
          git tag "v${{ steps.version.outputs.version }}" 2>/dev/null || true
          git push origin "v${{ steps.version.outputs.version }}" 2>/dev/null || true

      - name: Create GitHub Release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## LynxPrompt for VS Code v${{ steps.version.outputs.version }}

            **Install:** [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=LynxPrompt.lynxprompt) · `ext install LynxPrompt.lynxprompt`

            **Full changelog:** [`v${{ steps.version.outputs.current }}...v${{ steps.version.outputs.version }}`](https://github.com/GeiserX/lynxprompt-vscode/compare/v${{ steps.version.outputs.current }}...v${{ steps.version.outputs.version }})
          files: lynxprompt-${{ steps.version.outputs.version }}.vsix
          generate_release_notes: true
