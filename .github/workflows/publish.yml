name: Publish Extension

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(npx semver "$CURRENT" -i patch)
          npm version "$NEW" --no-git-tag-version
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW"

      - name: Package VSIX
        run: npx @vscode/vsce package --no-git-tag-version -o "lynxprompt-${{ steps.version.outputs.version }}.vsix"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-git-tag-version -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: npx ovsx publish "lynxprompt-${{ steps.version.outputs.version }}.vsix" -p "$OVSX_PAT" || true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## LynxPrompt for VS Code v${{ steps.version.outputs.version }}

            **Install:** [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=LynxPrompt.lynxprompt) · `ext install LynxPrompt.lynxprompt`

            **Full changelog:** [`v${{ steps.version.outputs.current }}...v${{ steps.version.outputs.version }}`](https://github.com/GeiserX/lynxprompt-vscode/compare/v${{ steps.version.outputs.current }}...v${{ steps.version.outputs.version }})
          files: lynxprompt-${{ steps.version.outputs.version }}.vsix
          generate_release_notes: true
